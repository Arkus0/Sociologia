name: Weekly deploy + newsletter

on:
  schedule:
    # Every Monday at 07:00 UTC (09:00 Madrid)
    - cron: "0 7 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel deploy hook
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

      # Wait for Vercel build to finish (static site ~2-3 min)
      - name: Wait for deploy
        run: sleep 180

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install web deps
        working-directory: sociology_kb_starter/web
        run: npm ci

      - name: Generate wiki artifacts
        working-directory: sociology_kb_starter/web
        run: npx tsx scripts/generate-wiki.ts

      - name: Send weekly newsletter
        working-directory: sociology_kb_starter/web
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: npx tsx scripts/send-weekly-newsletter.ts
