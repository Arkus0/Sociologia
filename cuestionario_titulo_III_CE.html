// Estado de la aplicación
let state = {
  screen: 'start', // start, quiz, results
  questions: [],
  currentIndex: 0,
  answers: {},
  showExplanation: false,
  questionCount: 20,
  categoryFilter: 'all'
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getCategories() {
  const cats = new Set(ALL_QUESTIONS.map(q => q.category));
  return [...cats].sort();
}

function startQuiz() {
  let pool = state.categoryFilter === 'all'
    ? [...ALL_QUESTIONS]
    : ALL_QUESTIONS.filter(q => q.category === state.categoryFilter);

  pool = shuffle(pool).slice(0, state.questionCount);
  state.questions = pool;
  state.currentIndex = 0;
  state.answers = {};
  state.showExplanation = false;
  state.screen = 'quiz';
  render();
}

function selectAnswer(idx) {
  const qId = state.questions[state.currentIndex].id;
  if (state.answers[qId] !== undefined) return;
  state.answers[qId] = idx;
  state.showExplanation = true;
  render();
}

function nextQuestion() {
  if (state.currentIndex < state.questions.length - 1) {
    state.currentIndex++;
    state.showExplanation = state.answers[state.questions[state.currentIndex].id] !== undefined;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevQuestion() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    state.showExplanation = state.answers[state.questions[state.currentIndex].id] !== undefined;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function finishQuiz() {
  state.screen = 'results';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  state.screen = 'start';
  render();
}

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'start') renderStart(app);
  else if (state.screen === 'quiz') renderQuiz(app);
  else renderResults(app);
}

function renderStart(app) {
  const cats = getCategories();
  app.innerHTML = `
    <div class="start-screen">
      <h2>Cuestionario: Título III de la Constitución Española</h2>
      <p>De las Cortes Generales — Artículos 66 a 96</p>
      <div class="info-box">
        <strong>Formato tipo oposiciones:</strong> Preguntas con 4 opciones (a, b, c, d) y una sola respuesta correcta.
        Las preguntas están diseñadas al estilo de los exámenes de Auxiliar Administrativo del Estado,
        con opciones trampa basadas en detalles numéricos, plazos, mayorías y matices del articulado.
        <br><br>
        <strong>Banco de preguntas:</strong> ${ALL_QUESTIONS.length} preguntas disponibles.
      </div>
      <div class="config-section">
        <label for="cat-filter">Filtrar por capítulo:</label>
        <select id="cat-filter" onchange="state.categoryFilter = this.value">
          <option value="all">Todos los capítulos (${ALL_QUESTIONS.length} preguntas)</option>
          ${cats.map(c => {
            const count = ALL_QUESTIONS.filter(q => q.category === c).length;
            return `<option value="${c}" ${state.categoryFilter === c ? 'selected' : ''}>${c} (${count} preguntas)</option>`;
          }).join('')}
        </select>
      </div>
      <div class="config-section">
        <label for="q-count">Número de preguntas:</label>
        <select id="q-count" onchange="state.questionCount = parseInt(this.value)">
          <option value="10" ${state.questionCount===10?'selected':''}>10 preguntas</option>
          <option value="15" ${state.questionCount===15?'selected':''}>15 preguntas</option>
          <option value="20" ${state.questionCount===20?'selected':''}>20 preguntas</option>
          <option value="30" ${state.questionCount===30?'selected':''}>30 preguntas</option>
          <option value="${ALL_QUESTIONS.length}" ${state.questionCount===ALL_QUESTIONS.length?'selected':''}>Todas (${ALL_QUESTIONS.length})</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()" style="margin-top: 16px;">Comenzar Test</button>
    </div>
  `;
}

function renderQuiz(app) {
  const q = state.questions[state.currentIndex];
  const answered = state.answers[q.id] !== undefined;
  const userAnswer = state.answers[q.id];
  const total = state.questions.length;
  const answeredCount = Object.keys(state.answers).length;
  const pct = ((state.currentIndex + 1) / total * 100).toFixed(0);
  const letters = ['a)', 'b)', 'c)', 'd)'];

  let optionsHtml = q.options.map((opt, i) => {
    let cls = 'option';
    if (answered) {
      cls += ' disabled';
      if (i === q.correct) cls += ' correct was-correct';
      else if (i === userAnswer && i !== q.correct) cls += ' incorrect';
    } else {
      // no extra class
    }
    return `<div class="${cls}" onclick="${answered ? '' : 'selectAnswer('+i+')'}">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
    </div>`;
  }).join('');

  let explanationHtml = '';
  if (state.showExplanation && answered) {
    const isCorrect = userAnswer === q.correct;
    explanationHtml = `<div class="explanation show">
      <strong>${isCorrect ? '✓ ¡Correcto!' : '✗ Incorrecto.'}</strong>
      <p style="margin-top:6px;">${q.explanation}</p>
    </div>`;
  }

  const isLast = state.currentIndex === total - 1;
  const allAnswered = answeredCount === total;

  app.innerHTML = `
    <div class="progress-bar-container">
      <div class="progress-info">
        <span>Pregunta ${state.currentIndex + 1} de ${total}</span>
        <span>${answeredCount} respondidas</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="question-card">
      <span class="category-tag">${q.category}</span>
      <div class="question-number">Pregunta ${state.currentIndex + 1}</div>
      <div class="question-text">${q.question}</div>
      <div class="options">${optionsHtml}</div>
      ${explanationHtml}
      <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled style="opacity:0.4"' : ''}>← Anterior</button>
        ${isLast && answered
          ? `<button class="btn btn-success" onclick="finishQuiz()">Ver Resultados</button>`
          : `<button class="btn btn-primary" onclick="nextQuestion()" ${!answered ? 'disabled style="opacity:0.4"' : ''}>Siguiente →</button>`
        }
      </div>
    </div>
    ${allAnswered && !isLast ? `<div style="text-align:center;margin-top:10px;"><button class="btn btn-success" onclick="finishQuiz()">Finalizar Test</button></div>` : ''}
  `;
}

function renderResults(app) {
  const total = state.questions.length;
  let correct = 0;
  let incorrect = 0;
  let unanswered = 0;

  state.questions.forEach(q => {
    const a = state.answers[q.id];
    if (a === undefined) unanswered++;
    else if (a === q.correct) correct++;
    else incorrect++;
  });

  const pct = Math.round(correct / total * 100);
  const scoreClass = pct >= 70 ? 'high' : pct >= 50 ? 'medium' : 'low';

  // Puntuación tipo oposiciones: acierto = 1, error = -0.33, blanco = 0
  const rawScore = (correct * 1 + incorrect * (-1/3)).toFixed(2);
  const maxScore = total;
  const scaledScore = (rawScore / maxScore * 10).toFixed(2);

  const letters = ['a)', 'b)', 'c)', 'd)'];

  let reviewHtml = state.questions.map((q, i) => {
    const a = state.answers[q.id];
    const isCorrect = a === q.correct;
    const cls = a === undefined ? 'review-incorrect' : isCorrect ? 'review-correct' : 'review-incorrect';
    const yourAnswer = a !== undefined ? `${letters[a]} ${q.options[a]}` : 'Sin responder';
    const correctAnswer = `${letters[q.correct]} ${q.options[q.correct]}`;

    return `<div class="review-item ${cls}">
      <div class="review-q">${i+1}. ${q.question}</div>
      <div class="review-answer">Tu respuesta: <span style="color:${isCorrect ? '#38a169' : '#e53e3e'}">${yourAnswer}</span></div>
      ${!isCorrect ? `<div class="review-answer">Respuesta correcta: <span style="color:#38a169">${correctAnswer}</span></div>` : ''}
      <div class="review-explanation">${q.explanation}</div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="results-screen">
      <h2>Resultados del Test</h2>
      <div class="score-display">
        <div class="score-circle ${scoreClass}">${pct}%</div>
        <div class="score-label">${correct} de ${total} correctas</div>
      </div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-number green">${correct}</div>
          <div class="stat-label">Aciertos</div>
        </div>
        <div class="stat-item">
          <div class="stat-number red">${incorrect}</div>
          <div class="stat-label">Errores</div>
        </div>
        <div class="stat-item">
          <div class="stat-number gray">${unanswered}</div>
          <div class="stat-label">En blanco</div>
        </div>
      </div>
      <div class="penalty-note">
        <strong>Puntuación con penalización (estilo oposiciones):</strong><br>
        Acierto: +1 | Error: −0,33 | Blanco: 0<br>
        Puntuación bruta: ${rawScore} / ${maxScore}<br>
        <div class="final-score" style="margin-top:8px;">Nota: ${scaledScore} / 10</div>
      </div>
      <div style="text-align:center; margin: 24px 0;">
        <button class="btn btn-primary" onclick="restartQuiz()">Nuevo Test</button>
      </div>
      <div class="review-section">
        <h3>Revisión de respuestas</h3>
        ${reviewHtml}
      </div>
      <div style="text-align:center; margin-top: 24px;">
        <button class="btn btn-primary" onclick="restartQuiz()">Nuevo Test</button>
      </div>
    </div>
  `;
}

// Inicializar
render();
</script>
